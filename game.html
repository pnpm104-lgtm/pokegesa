<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GAME | Poke Guesser</title>
    <link rel="stylesheet" href="./GAME _ Poke Guesser_files/style.css">
    <link rel="icon" href="https://zukan.pokemon.co.jp/img/ball.svg">
</head>
<body>
    <header id="app-header">
        <a class="logo" href="#">Poke <span class="logo-accent">Guesser</span></a>
    </header>
    <div id="theme-container">
        <main id="main-content">
            <div id="game-container">
                <div id="game-header-area">
                    <h2 id="game-title">対戦モード (カスタム)</h2>
                </div>
                
                <div id="versus-lobby-area">
                    <div class="vlobby-card" style="background: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); max-width: 400px; margin: 20px auto; text-align: center;">
                        <section class="vlobby-panel vlobby-create">
                            <h4 class="vlobby-panel-title" style="font-size: 1.2rem; margin-bottom: 10px;">ルームを作成</h4>
                            <p class="vlobby-panel-description" style="color: #666; font-size: 0.9rem;">表示されたコードを友達に共有してください</p>
                            <div class="vlobby-code" style="margin: 20px 0;">
                                <span id="vs-my-code" style="font-size: 2.5rem; font-weight: bold; letter-spacing: 4px; color: #ff5a5f;">------</span>
                            </div>
                            <div class="vlobby-actions">
                                <button id="vs-create" style="background: #ff5a5f; color: white; border: none; padding: 12px 24px; font-size: 1rem; border-radius: 4px; cursor: pointer; font-weight: bold;">コード生成</button>
                            </div>
                        </section>
                        
                        <hr style="margin: 30px 0; border: 0; border-top: 1px dashed #ccc;">
                        
                        <section class="vlobby-panel vlobby-join">
                            <h4 class="vlobby-panel-title" style="font-size: 1.2rem; margin-bottom: 10px;">ルームに参加</h4>
                            <p class="vlobby-panel-description" style="color: #666; font-size: 0.9rem;">友達のコード（数字6桁）を入力してください</p>
                            <div class="vlobby-join-input" style="margin: 15px 0;">
                                <input id="vs-code" style="font-size: 1.5rem; padding: 8px; width: 80%; text-align: center; border: 1px solid #ccc; border-radius: 4px;" inputmode="numeric" maxlength="6" placeholder="123456">
                            </div>
                            <div class="vlobby-actions">
                                <button id="vs-join" style="background: #333; color: white; border: none; padding: 10px 20px; font-size: 0.9rem; border-radius: 4px; cursor: pointer;">参加する</button>
                            </div>
                        </section>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- 動きを付けるプログラム -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const createBtn = document.getElementById('vs-create');
            const codeDisplay = document.getElementById('vs-my-code');
            const joinBtn = document.getElementById('vs-join');
            const joinInput = document.getElementById('vs-code');

            // 「コード生成」ボタンを押したときの動き
            if (createBtn && codeDisplay) {
                createBtn.addEventListener('click', () => {
                    // ランダムな6桁の数字を作る
                    const randomCode = Math.floor(100000 + Math.random() * 900000);
                    codeDisplay.innerText = randomCode;
                    alert("部屋を作りました！コード: " + randomCode + " を友達に伝えてください。");
                });
            }

            // 「参加する」ボタンを押したときの動き
            if (joinBtn && joinInput) {
                joinBtn.addEventListener('click', () => {
                    const enteredCode = joinInput.value.trim();
                    if (enteredCode.length === 6 && !isNaN(enteredCode)) {
                        alert("部屋コード " + enteredCode + " に参加しました！対戦を始めます。");
                    } else {
                        alert("正しい6桁の数字を入力してください。");
                    }
                });
            }
        });
    </script>
</body>
</html>
