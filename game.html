<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ポケゲサ - 対戦ロビー</title>
  <style>
    body {
      font-family: 'Helvetica Neue', Arial, sans-serif;
      background-color: #e8f5e9;
      margin: 0;
      padding: 10px;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }

    .vlobby-card, .quiz-card {
      background: #fff;
      padding: 25px;
      border-radius: 12px;
      box-shadow: 0 8px 16px rgba(0,0,0,0.05);
      max-width: 450px;
      width: 90%;
      text-align: center;
      margin-top: 20px;
    }

    .pokemon-banner {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-bottom: 15px;
    }
    .pokemon-banner img {
      width: 80px;
      height: 80px;
      object-fit: contain;
    }

    .lobby-header h2 {
      color: #2e7d32;
      margin: 0 0 5px 0;
      font-size: 1.8rem;
    }
    .lobby-header .subtitle {
      color: #555;
      font-size: 0.95rem;
      margin: 0 0 20px 0;
    }

    h4 { margin: 10px 0 5px 0; font-size: 1.2rem; }
    p { color: #666; font-size: 0.85rem; margin: 5px 0 15px 0; }

    .lobby-btn, .game-btn {
      padding: 12px;
      font-size: 1rem;
      font-weight: bold;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      width: 100%;
      box-sizing: border-box;
      transition: background 0.2s;
    }
    .main-input {
      font-size: 1.5rem;
      padding: 10px;
      width: 100%;
      box-sizing: border-box;
      text-align: center;
      border: 2px solid #ddd;
      border-radius: 6px;
      margin-bottom: 15px;
    }

    .vlobby-create {
      background-color: #fffde7;
      padding: 20px;
      border-radius: 8px;
      border: 1px solid #fff59d;
    }
    .vlobby-create h4 { color: #f57f17; }
    .vlobby-code-box {
      margin: 15px 0;
      padding: 10px;
      background: #fff;
      border: 2px dashed #f57f17;
      border-radius: 8px;
    }
    #vs-my-code {
      font-size: 2.5rem;
      font-weight: bold;
      letter-spacing: 6px;
      color: #f57f17;
    }
    #vs-create { background: #f57f17; color: white; }

    .lobby-separator {
      margin: 20px 0; position: relative; text-align: center;
    }
    .lobby-separator::before {
      content: ""; position: absolute; top: 50%; left: 0; right: 0; height: 1px; background: #ccc; z-index: 1;
    }
    .lobby-separator span {
      background: #fff; padding: 0 15px; color: #777; font-weight: bold; font-size: 0.9rem; position: relative; z-index: 2;
    }

    .vlobby-join {
      background-color: #e3f2fd;
      padding: 20px;
      border-radius: 8px;
      border: 1px solid #90caf9;
    }
    .vlobby-join h4 { color: #0d47a1; }
    #vs-join { background: #1e88e5; color: white; }

    /* --- 対戦ゲーム画面のスタイル --- */
    .score-board {
      display: flex;
      justify-content: space-between;
      background: #f0f0f0;
      padding: 12px;
      border-radius: 6px;
      font-weight: bold;
      margin-bottom: 15px;
      font-size: 1.1rem;
    }
    .game-input-area {
      display: flex;
      gap: 10px;
      margin-bottom: 15px;
    }
    #pokemon-guess-input {
      flex: 1;
      padding: 10px;
      font-size: 1.1rem;
      border: 2px solid #ccc;
      border-radius: 6px;
    }
    #guess-submit-btn {
      width: auto;
      padding: 10px 20px;
      background: #2e7d32;
      color: white;
    }
    
    /* 判定結果の履歴テーブル */
    .history-table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 15px;
      font-size: 0.85rem;
    }
    .history-table th, .history-table td {
      border: 1px solid #ddd;
      padding: 8px 4px;
      text-align: center;
    }
    .history-table th { background: #f5f5f5; }
    
    /* 判定カラー */
    .cell-match { background-color: #c8e6c9; color: #2e7d32; font-weight: bold; } /* 🟩 */
    .cell-differ { background-color: #ffcdd2; color: #c62828; font-weight: bold; } /* 🟥 */
    .cell-up { background-color: #fff9c4; color: #f57f17; font-weight: bold; }    /* ⬆ */
    .cell-down { background-color: #b3e5fc; color: #0d47a1; font-weight: bold; }  /* ⬇ */

    .hidden { display: none !important; }
  </style>
</head>
<body>

  <!-- ロビー画面 -->
  <div id="lobby-screen" class="vlobby-card">
    <div class="pokemon-banner">
      <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/25.png" alt="Pikachu">
      <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/133.png" alt="Eevee">
    </div>

    <div class="lobby-header">
      <h2>対戦モード</h2>
      <div class="subtitle"><strong>ルームを作成 or ルームに参加</strong></div>
    </div>

    <section class="vlobby-panel vlobby-create">
      <h4>ルームを作成</h4>
      <p>表示されたコードを共有してください</p>
      <div class="vlobby-code-box"><span id="vs-my-code">----</span></div>
      <button id="vs-create" class="lobby-btn">コード生成</button>
      <div id="status-msg" style="color:#e65100; margin-top:8px; font-weight:bold;"></div>
    </section>

    <div class="lobby-separator"><span>OR</span></div>

    <section class="vlobby-panel vlobby-join">
      <h4>ルームに参加</h4>
      <p>コード（数字4桁）を入力してください</p>
      <input id="vs-code" class="main-input" inputmode="numeric" maxlength="4" placeholder="1234">
      <button id="vs-join" class="lobby-btn">参加する</button>
    </section>
  </div>

  <!-- 対戦ゲーム画面 -->
  <div id="quiz-screen" class="quiz-card hidden">
    <div class="score-board">
      <div id="host-score-display">ホスト: 0点</div>
      <div id="guest-score-display">ゲスト: 0点</div>
    </div>
    
    <h3 style="color: #2e7d32; margin: 5px 0;">正解のポケモンを推理せよ！</h3>
    <p style="color: #555;">タイプ、世代、高さ、重さをヒントに絞り込もう。</p>

    <!-- 推理入力エリア -->
    <div class="game-input-area">
      <input type="text" id="pokemon-guess-input" placeholder="ポケモン名を入力 (例: ピカチュウ)">
      <button id="guess-submit-btn" class="game-btn">送信</button>
    </div>

    <!-- 自分の判定履歴 -->
    <h4>あなたの推測履歴</h4>
    <table class="history-table">
      <thead>
        <tr>
          <th>名前</th>
          <th>タイプ</th>
          <th>世代</th>
          <th>高さ</th>
          <th>重さ</th>
        </tr>
      </thead>
      <tbody id="history-log">
        <!-- ここに推測結果が追加されていく -->
      </tbody>
    </table>

    <div id="game-status-msg" style="margin-top: 20px; font-weight: bold; font-size: 1.1rem; color: #d32f2f;"></div>
  </div>

  <script src="game.js"></script>
</body>
</html>
