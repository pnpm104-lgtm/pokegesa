<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ポケゲサ - 対戦ロビー</title>
  <style>
    /* ⑦ 全体的なデザイン・落ち着いた配色（淡い緑色の背景） */
    body {
      font-family: 'Helvetica Neue', Arial, sans-serif;
      background-color: #e8f5e9; /* 淡い緑色の背景 */
      margin: 0;
      padding: 10px;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }

    /* ロビー画面全体 */
    .vlobby-card {
      background: #fff;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 8px 16px rgba(0,0,0,0.05);
      max-width: 400px;
      width: 90%;
      text-align: center;
      margin-top: 30px;
    }

    /* ポケモンイラストの配置エリア */
    .pokemon-banner {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-bottom: 15px;
    }
    .pokemon-banner img {
      width: 80px;
      height: 80px;
      object-fit: contain;
    }

    /* ヘッダーデザイン */
    .lobby-header h2 {
      color: #2e7d32;
      margin: 0 0 5px 0;
      font-size: 1.8rem;
    }
    .lobby-header .subtitle {
      color: #555;
      font-size: 0.95rem;
      margin: 0 0 20px 0;
    }

    h4 {
      margin: 10px 0 5px 0;
      font-size: 1.2rem;
    }
    p {
      color: #666;
      font-size: 0.85rem;
      margin: 5px 0 15px 0;
    }

    /* 共通ボタン・入力欄 */
    .lobby-btn {
      padding: 12px;
      font-size: 1rem;
      font-weight: bold;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      width: 100%;
      box-sizing: border-box;
      transition: background 0.2s;
    }
    .main-input {
      font-size: 1.8rem;
      padding: 10px;
      width: 100%;
      box-sizing: border-box;
      text-align: center;
      border: 2px solid #ddd;
      border-radius: 6px;
      margin-bottom: 15px;
      letter-spacing: 4px;
    }

    /* ルームを作成（ホスト側：黄色系） */
    .vlobby-create {
      background-color: #fffde7; /* 淡い黄色の背景 */
      padding: 20px;
      border-radius: 8px;
      border: 1px solid #fff59d;
    }
    .vlobby-create h4 {
      color: #f57f17;
    }
    .vlobby-code-box {
      margin: 15px 0;
      padding: 10px;
      background: #fff;
      border: 2px dashed #f57f17;
      border-radius: 8px;
    }
    #vs-my-code {
      font-size: 2.5rem;
      font-weight: bold;
      letter-spacing: 6px;
      color: #f57f17;
    }
    #vs-create {
      background: #f57f17;
      color: white;
    }
    #vs-create:hover {
      background: #e65100;
    }

    /* 区切り（OR） */
    .lobby-separator {
      margin: 20px 0;
      position: relative;
      text-align: center;
    }
    .lobby-separator::before {
      content: "";
      position: absolute;
      top: 50%;
      left: 0;
      right: 0;
      height: 1px;
      background: #ccc;
      z-index: 1;
    }
    .lobby-separator span {
      background: #fff;
      padding: 0 15px;
      color: #777;
      font-weight: bold;
      font-size: 0.9rem;
      position: relative;
      z-index: 2;
    }

    /* ルームに参加（ゲスト側：青色系） */
    .vlobby-join {
      background-color: #e3f2fd; /* 淡い青色の背景 */
      padding: 20px;
      border-radius: 8px;
      border: 1px solid #90caf9;
    }
    .vlobby-join h4 {
      color: #0d47a1;
    }
    .vlobby-join .main-input:focus {
      border-color: #1e88e5;
      outline: none;
    }
    #vs-join {
      background: #1e88e5;
      color: white;
    }
    #vs-join:hover {
      background: #1565c0;
    }

    #status-msg {
      font-weight: bold;
      margin-top: 8px;
      font-size: 0.85rem;
    }

    /* クイズ対戦画面（デフォルトは非表示） */
    .quiz-area {
      width: 100%;
      max-width: 600px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .hidden {
      display: none !important;
    }
  </style>
</head>
<body>

  <!-- ロビー画面 HTML -->
  <div id="lobby-screen" class="vlobby-card">
    <!-- ポケモンイラストバナー -->
    <div class="pokemon-banner">
      <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/25.png" alt="Pikachu">
      <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/133.png" alt="Eevee">
    </div>

    <!-- 1. ヘッダー -->
    <div class="lobby-header">
      <h2>対戦モード</h2>
      <div class="subtitle"><strong>ルームを作成 or ルームに参加</strong></div>
    </div>

    <!-- 2. ルームを作成（ホスト側：黄色セクション） -->
    <section class="vlobby-panel vlobby-create">
      <h4>ルームを作成</h4>
      <p>表示されたコードを共有してください</p>
      <div class="vlobby-code-box">
        <span id="vs-my-code">----</span>
      </div>
      <button id="vs-create" class="lobby-btn">コード生成</button>
      <div id="status-msg" style="color:#e65100;"></div>
    </section>

    <!-- 3. 区切り（OR） -->
    <div class="lobby-separator">
      <span>OR</span>
    </div>

    <!-- 4. ルームに参加（ゲスト側：青色セクション） -->
    <section class="vlobby-panel vlobby-join">
      <h4>ルームに参加</h4>
      <p>コード（数字4桁）を入力してください</p>
      <input id="vs-code" class="main-input" inputmode="numeric" maxlength="4" placeholder="1234">
      <button id="vs-join" class="lobby-btn">参加する</button>
    </section>
  </div>

  <!-- クイズ対戦画面エリア（ゲーム開始後に JavaScript で hidden を外して表示） -->
  <div id="quiz-screen" class="quiz-area hidden">
    <!-- ここに既存のクイズ画面の要素（問題文や選択肢ボタンなど）があれば入れてください -->
  </div>

  <!-- Firebase ライブラリの読み込み（お使いのバージョンに合わせて調整してください） -->
  <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>

  <!-- Firebaseの初期化設定スクリプト（あなたのプロジェクトのConfigを入れてください） -->
  <script>
    // ※ すでに index.html 等で初期化している、または不要な場合は適宜書き換えてください
    const firebaseConfig = {
      // apiKey: "YOUR_API_KEY",
      // databaseURL: "YOUR_DATABASE_URL",
      // ...
    };
    if (typeof firebase !== 'undefined' && firebase.apps.length === 0) {
      firebase.initializeApp(firebaseConfig);
    }
  </script>

  <!-- ★ここが重要！HTMLの要素をすべて作り終えた「一番最後」にロジックファイルを読み込みます -->
  <script src="game.js"></script>

</body>
</html>
